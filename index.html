<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Login</title>
     <!-- tailwind and daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

     <style>
        .font-geist{
             font-family: "Geist", sans-serif;
        }
     </style>
</head>
<body class="font-geist bg-base-200">
    <section class="flex justify-center items-center min-h-screen">
        <fieldset class="fieldset rounded-box w-[450px] p-4 bg-white">
        <div class="flex flex-col justify-center items-center mb-5 mt-4">
            <img src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-[24px]">GitHub Issues Tracker</h2>
            <p class="text-[16px] text-[#64748B]">Sign in to manage your issues</p>

        </div>
  <label class="label font-medium text-[16px] text-black">Username</label>
  <input type="text" class="input w-full rounded-lg" placeholder="Enter Username" />
  <p class="text-[#4A00FF] mb-2">Default:admin</p>

  <label class="label font-medium text-[16px] text-black">Password</label>
  <input type="password" class="input w-full rounded-lg" placeholder="Password" />
  <p class="text-[#4A00FF]">Default:admin123</p>
  <button class="btn btn-primary mt-4 mb-3">Sign in</button>
 <div class="flex items-center mb-2">
    <div class="flex-grow border-t border-gray-200"></div>
    <span class="text-[16px]">OR</span>
    <div class="flex-grow border-t border-gray-200"></div>
 </div>
 <div>
    <p class="text-center text-[#64748B] text-[14px] mb-2">Demo Credentials:</p>
 </div>
 <div class="text-center bg-base-200 p-4">
    <p class="text-[14px]"><span class="text-[16px] font-semibold">Username:</span> admin</p>
    <p class="text-[14px]"><span class="text-[16px] font-semibold">Password:</span> admin123</p>
 </div>
</fieldset>
    </section> 
   
</body>
</html>
